name: CI

# ========================================================================
# Workflow Triggers Configuration
# ========================================================================
# Single Ubuntu job (one checkout + one Flutter setup + one pub get) to keep
# GitHub Actions minutes low for forks and small teams. For faster feedback at
# higher cost, split format/analyze/test into parallel jobs again.
# ========================================================================
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed lib test integration_test tool bricks

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        timeout-minutes: 15
        run: flutter test --timeout=5m
