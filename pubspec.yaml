name: flutter_starter
description: A production-ready Flutter starter project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '^3.8.0'

dependencies:
  # UI Components - iOS style icons
  crypto: ^3.0.7
  cupertino_icons: ^1.0.8

  # Network Layer - HTTP client with interceptors support
  dio: ^5.9.0

  # Utilities - Value equality comparison for objects
  equatable: ^2.0.7

  # Flutter SDK - Core Flutter framework
  flutter:
    sdk: flutter

  # Configuration - Environment variable loader from .env files
  flutter_dotenv: ^6.0.0

  # Localization - Flutter localization support
  flutter_localizations:
    sdk: flutter

  # State Management - Riverpod reactive state management framework
  flutter_riverpod: ^3.0.3

  # Storage - Secure key-value storage for sensitive data (tokens, passwords)
  flutter_secure_storage: ^10.0.0
  # Security (optional) - FreeRASP concrete implementation
  freerasp: ^6.1.1

  # Code Generation - Runtime annotations for Freezed immutable classes
  freezed_annotation: ^3.1.0

  # Routing - Declarative routing for Flutter with deep linking support
  go_router: ^17.0.0

  # Utilities - Internationalization and localization support
  # Used in date_formatter.dart for date formatting
  intl: ^0.20.2

  # Code Generation - Runtime annotations for JSON serialization
  json_annotation: ^4.9.0

  # Logging - Comprehensive logging solution with multiple outputs
  logger: ^2.6.2

  # File System - Path provider for file-based logging
  path: ^1.9.1
  path_provider: ^2.1.5

  # Riverpod Generator - annotations for @riverpod
  riverpod_annotation: ^3.0.3

  # Storage - Simple key-value storage for non-sensitive data
  shared_preferences: ^2.5.3

  # Network Layer - WebSocket client
  web_socket_channel: ^3.0.1


dev_dependencies:
  # Code Generation - Build system for generating code from annotations
  build_runner: ^2.10.3

  # Branding & UI configuration tools
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

  # Testing - Flutter testing framework and utilities
  flutter_test:
    sdk: flutter

  # Code Generation - Generates immutable classes, unions, and more
  freezed: ^3.2.3

  # Integration / E2E driver binding (Flutter convention — tests live in
  # integration_test/). Patrol builds on this stack.
  integration_test:
    sdk: flutter

  # Code Generation - Generates JSON serialization/deserialization code
  json_serializable: ^6.11.1

  # Mason brick hooks import package:mason; dev_dependency here so the analyzer
  # resolves it for bricks/flutter_starter_setup/hooks/post_gen.dart.
  mason: ^0.1.2

  # Testing - Mocking library for unit tests (no code generation required)
  mocktail: ^1.0.4

  # Testing - End-to-End testing framework
  patrol: ^3.10.0

  # Riverpod Generator - generates provider boilerplate
  riverpod_generator: ^3.0.3

  # Linting - Comprehensive lint rules for Flutter/Dart (Very Good Ventures)
  very_good_analysis: ^10.0.0


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Generate localization files from ARB files
  generate: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # Environment configuration files
  # Note: Only .env.example is included (it's committed to git)
  # Users should copy .env.example to .env for local development
  # The .env file is optional - the app works with --dart-define flags too
  assets:
    - .env.example

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

# Patrol E2E (https://patrol.leancode.co/) — used by integration_test/*.dart
patrol:
  app_name: flutter_starter
  android:
    package_name: com.example.flutter_starter
